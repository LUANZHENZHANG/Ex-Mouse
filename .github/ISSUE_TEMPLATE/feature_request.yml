name: 功能建议
description: 提议一个明确、可验证的新功能或兼容性改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请先描述实际使用中的问题，不要只描述解决方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明交互方式、预期行为及开关设置。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前如何绕过该问题？是否有可参考的开源实现？
  - type: textarea
    id: impact
    attributes:
      label: 权限和兼容性影响
      description: 是否需要新增系统权限、常驻服务或第三方依赖？
    validations:
      required: true
